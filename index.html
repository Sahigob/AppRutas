<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Rutas PRO - Multi-Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --primary: #0ea5e9; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; display:flex; flex-direction: row; height:100vh; background: var(--bg); }
        #map { flex:1; height: 100%; z-index: 1; }
        #panel { width:400px; padding:20px; overflow-y:auto; background: var(--card-bg); border-left: 1px solid var(--border); box-sizing: border-box; z-index: 10; }
        @media (max-width: 768px) { body { flex-direction: column; } #map { flex: none; height: 30vh; } #panel { width: 100%; flex: 1; } }
        
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        input, textarea, select { width:100%; margin:5px 0; padding:10px; border-radius:8px; border:1px solid var(--border); box-sizing: border-box; }
        
        button { width:100%; padding:12px; margin:5px 0; border-radius:8px; border:none; background: var(--primary); color:white; font-weight:600; cursor:pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .smallBtn { padding:5px 10px; font-size:11px; width: auto; display: inline-flex; margin: 2px; }
        .deleteBtn { background:#ef4444; }
        .saveBtn { background: #22c55e; }
        
        .client { padding:10px; border: 1px solid var(--border); margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .client-selected { background: #fee2e2 !important; border-color: #ef4444 !important; }
        .hidden { display: none; }
        input[type="checkbox"] { width: auto; transform: scale(1.2); margin-right: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
    <div id="authSection" class="card">
        <h3>🔐 Acceso y Registro</h3>
        <p style="font-size: 12px; color: #64748b; margin-top: -5px;">Si el usuario no existe, se creará uno nuevo automáticamente.</p>
        <input id="email" type="email" placeholder="Correo electrónico" />
        <input id="password" type="password" placeholder="Contraseña (mín. 6 caracteres)" />
        <button id="btnLogin" style="background: #0369a1;">Entrar o Registrar Nuevo</button>
    </div>

    <div id="mainSection" class="hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items: center;">
            <span id="userDisplay" style="font-size: 11px; color: #0ea5e9; font-weight: bold;"></span>
            <button id="btnLogout" class="deleteBtn smallBtn">Cerrar Sesión</button>
        </div>

        <div class="card">
            <h3>👥 Gestión de Cliente</h3>
            <input id="name" placeholder="Nombre del cliente" />
            <input id="address" placeholder="Dirección (o usa GPS/Coordenadas)" />
            <div style="display:flex; gap:5px">
                <input id="manualLat" placeholder="Latitud" />
                <input id="manualLng" placeholder="Longitud" />
            </div>
            <textarea id="notes" placeholder="Notas (Escribe 'Hotel' o 'Comida' para cambiar icono)" rows="1"></textarea>
            <button id="btnAddClient" class="saveBtn">💾 Guardar en mi lista</button>
        </div>

        <div class="card">
            <h3>🧭 Ruta y Navegación</h3>
            <input type="date" id="routeDate" />
            <select id="startOption">
                <option value="gps">📍 Salida: Mi ubicación GPS</option>
                <option value="manual">✏️ Salida: Dirección manual</option>
            </select>
            <input id="startAddress" placeholder="Dirección de salida..." style="display:none"/>
            <button id="btnCreateRoute">🧭 Dibujar Ruta Azul</button>
            <div id="routeHistoryList" style="margin-top: 10px;"></div>
        </div>

        <div class="card">
            <h3>🚗 Abrir en Google Maps</h3>
            <button id="btnRutaOrdenEstricto" style="background:#ffc107; color:black"><b>Google (Orden de mi Lista)</b></button>
            <button id="btnGoogleOptimizado" style="background:#22c55e"><b>Google (Optimizar Trayecto)</b></button>
            <button id="btnClearRoute" style="background:#64748b">🧹 Limpiar mapa</button>
        </div>

        <h3>📊 Mis Clientes (<span id="stats">0</span>)</h3>
        <div id="clientList"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyByi9lTT4kN4YbD8cneKLmTm05RzCAgPhI", 
        authDomain: "organizador-de-visitas-f10ad.firebaseapp.com", 
        projectId: "organizador-de-visitas-f10ad", 
        storageBucket: "organizador-de-visitas-f10ad.firebasestorage.app", 
        messagingSenderId: "737024476908", 
        appId: "1:737024476908:web:09cf2cc99ac0b7352f07c9" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let clients=[], markers=[], routeLine, lastRouteClients=[];
    let map = L.map('map').setView([40, -3], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const iconNormal = new L.Icon({ iconUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41] });
    const iconFood = new L.Icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448609.png", iconSize:[35,35], iconAnchor:[17,35] });
    const iconHotel = new L.Icon({ iconUrl: "data:image/svg+xml;base64," + btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 38 38"><circle cx="19" cy="19" r="18" fill="#ff9900" stroke="white" stroke-width="2"/><text x="50%" y="55%" font-size="18" text-anchor="middle" fill="black" font-family="Arial" font-weight="bold" dominant-baseline="middle">H</text></svg>`), iconSize:[35,35], iconAnchor:[17,35] });
    const iconRed = new L.Icon({ iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png", shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41] });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = "Sesión: " + user.email;
            cargarDatos();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainSection').classList.add('hidden');
        }
    });

    // LÓGICA DE ACCESO: LOGIN O CREACIÓN
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return alert("Rellena todos los campos");

        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("¡Nuevo usuario creado correctamente!");
                } catch (createError) {
                    alert("Error al crear usuario: " + createError.message);
                }
            } else {
                alert("Error: " + error.message);
            }
        }
    };

    async function cargarDatos() {
        const qC = query(collection(db, "clientes"), where("userId", "==", auth.currentUser.uid));
        const snapC = await getDocs(qC);
        clients = snapC.docs.map(d => ({...d.data(), id: d.id})).sort((a,b)=>a.name.localeCompare(b.name));
        
        const qR = query(collection(db, "rutas"), where("userId", "==", auth.currentUser.uid));
        const snapR = await getDocs(qR);
        const hist = document.getElementById('routeHistoryList');
        hist.innerHTML = "";
        snapR.forEach(d => {
            const r = d.data();
            let div = document.createElement('div');
            div.style = "display:flex; justify-content:space-between; background:#f1f5f9; padding:5px; border-radius:5px; margin-bottom:3px; font-size:11px;";
            div.innerHTML = `<span>📅 ${r.date}</span><div><button class="smallBtn saveBtn" onclick="window.cargarRuta('${d.id}')">📂</button><button class="smallBtn deleteBtn" onclick="window.borrarRuta('${d.id}')">🗑️</button></div>`;
            hist.appendChild(div);
        });
        renderClientes();
    }

    function renderClientes() {
        const cont = document.getElementById('clientList'); cont.innerHTML = "";
        markers.forEach(m => map.removeLayer(m)); markers = [];
        clients.forEach((c, i) => {
            let div = document.createElement('div'); div.id = 'div-c'+i;
            div.className = 'client';
            div.onclick = (e) => { if(e.target.tagName !== 'BUTTON') window.toggle(i); };
            div.innerHTML = `<div style="display:flex; align-items:center;"><input type="checkbox" id="c${i}"><div><b>${c.name}</b><br><small>${c.address || 'Coord: '+c.lat.toFixed(3)}</small></div></div>
            <button class="smallBtn" onclick="window.edit('${c.id}'); event.stopPropagation();">✏️ Editar</button>
            <button class="smallBtn deleteBtn" onclick="window.del('${c.id}'); event.stopPropagation();">🗑️</button>`;
            
            cont.appendChild(div);
            let icon = iconNormal;
            const nt = (c.notes || "").toLowerCase();
            if(nt.includes("hotel")) icon = iconHotel;
            if(nt.includes("comida") || nt.includes("restaurante")) icon = iconFood;
            
            let m = L.marker([c.lat, c.lng], {icon: icon}).addTo(map);
            m.on('click', (e) => { L.DomEvent.stopPropagation(e); window.toggle(i); });
            markers.push(m);
        });
        document.getElementById('stats').innerText = clients.length;
    }

    window.toggle = (i) => {
        const cb = document.getElementById('c'+i);
        cb.checked = !cb.checked;
        document.getElementById('div-c'+i).classList.toggle('client-selected', cb.checked);
        markers[i].setIcon(cb.checked ? iconRed : iconNormal); // Podrías refinar para que vuelva a su icono de hotel/comida
    };

    // --- GOOGLE MAPS (ORDEN LISTA PROYECTO 1) ---
    window.abrirGoogle = (optimizado) => {
        let lista = clients.filter((c,i) => document.getElementById('c'+i).checked);
        if(optimizado && lastRouteClients.length > 0) lista = lastRouteClients;
        if(lista.length === 0) return alert("Selecciona paradas");

        let origin = (document.getElementById('startOption').value === "gps") ? "" : encodeURIComponent(document.getElementById('startAddress').value);
        let destObj = lista[lista.length - 1];
        let destination = destObj.address ? encodeURIComponent(destObj.address) : `${destObj.lat},${destObj.lng}`;
        let waypoints = lista.slice(0, -1).map(c => c.address ? encodeURIComponent(c.address) : `${c.lat},${c.lng}`).join('|');

        // URL PARA FORZAR ORDEN (Basada en tu Proyecto 1)
        window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=driving`, '_blank');
    };

    window.createRoute = async (isLoading = false) => {
        let sel = clients.filter((c,i) => document.getElementById('c'+i).checked);
        if(sel.length < 1) return alert("Selecciona paradas");
        const mode = document.getElementById('startOption').value;
        let sLat, sLng;
        if(mode === "gps"){
            const p = await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j));
            sLat = p.coords.latitude; sLng = p.coords.longitude;
        } else {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(document.getElementById('startAddress').value)}`);
            const d = await res.json();
            sLat = parseFloat(d[0].lat); sLng = parseFloat(d[0].lon);
        }
        const str = [[sLat,sLng], ...sel.map(c=>[c.lat,c.lng])].map(c=>`${c[1]},${c[0]}`).join(';');
        const res = await fetch(`https://router.project-osrm.org/trip/v1/driving/${str}?source=first&destination=last&roundtrip=false&overview=full&geometries=geojson`);
        const data = await res.json();
        if(data.trips) {
            if(routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(data.trips[0].geometry, {style: {color: '#0ea5e9', weight: 5}}).addTo(map);
            map.fitBounds(routeLine.getBounds());
            const idxs = data.waypoints.sort((a,b)=>a.waypoint_index - b.waypoint_index).map(w => w.waypoint_index);
            lastRouteClients = idxs.slice(1).map(idx => sel[idx-1]);
            if(!isLoading) {
                await addDoc(collection(db, "rutas"), { userId: auth.currentUser.uid, date: document.getElementById('routeDate').value || "Hoy", clientIds: sel.map(c => c.id) });
                cargarDatos();
            }
        }
    };

    window.addClient = async () => {
        const n = document.getElementById('name').value, a = document.getElementById('address').value, la = document.getElementById('manualLat').value, lo = document.getElementById('manualLng').value, nt = document.getElementById('notes').value;
        let lat, lng;
        if(la && lo) { lat = parseFloat(la); lng = parseFloat(lo); }
        else if(a) {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(a)}`);
            const d = await r.json(); lat = parseFloat(d[0].lat); lng = parseFloat(d[0].lon);
        } else {
            const p = await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j));
            lat = p.coords.latitude; lng = p.coords.longitude;
        }
        await addDoc(collection(db, "clientes"), { name:n, address:a, lat, lng, notes:nt, userId: auth.currentUser.uid });
        cargarDatos();
    };

    window.del = async (id) => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "clientes", id)); cargarDatos(); } };
    window.borrarRuta = async (id) => { if(confirm("¿Borrar historial?")) { await deleteDoc(doc(db, "rutas", id)); cargarDatos(); } };
    window.cargarRuta = async (id) => {
        const snap = await getDocs(query(collection(db, "rutas"), where("userId", "==", auth.currentUser.uid)));
        const r = snap.docs.find(d => d.id === id).data();
        clients.forEach((c, i) => {
            const cb = document.getElementById('c'+i);
            cb.checked = r.clientIds.includes(c.id);
            document.getElementById('div-c'+i).classList.toggle('client-selected', cb.checked);
        });
        window.createRoute(true);
    };

    document.getElementById('btnAddClient').onclick = window.addClient;
    document.getElementById('btnCreateRoute').onclick = () => window.createRoute(false);
    document.getElementById('btnRutaOrdenEstricto').onclick = () => window.abrirGoogle(false);
    document.getElementById('btnGoogleOptimizado').onclick = () => window.abrirGoogle(true);
    document.getElementById('startOption').onchange = (e) => document.getElementById('startAddress').style.display = e.target.value === "manual" ? "block" : "none";
    document.getElementById('btnLogout').onclick = () => signOut(auth);
</script>
</body>
</html>
